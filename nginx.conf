server {
    listen 80;
    server_name _;

    root /usr/share/nginx/html;
    index index.html;

    # Gzip compression
    gzip on;
    gzip_vary on;
    gzip_min_length 1024;
    gzip_proxied any;
    gzip_types
        text/plain
        text/css
        text/javascript
        application/javascript
        application/json
        application/manifest+json
        image/svg+xml;

    # ── SEO 301 Redirects for Legacy URLs ──────────────────────────────
    rewrite ^/index\.php$ / permanent;
    rewrite ^/about/?$ / permanent;
    rewrite ^/why-fresh-food/?$ / permanent;
    rewrite ^/testimonial/.*$ / permanent;


    # ── API proxy to backend container ───────────────────────────────
    location /api/ {
        proxy_pass http://backend:5000;
        proxy_http_version 1.1;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;

        # Generous timeouts for AI requests
        proxy_connect_timeout 300s;
        proxy_send_timeout    300s;
        proxy_read_timeout    300s;
    }

    # ── index.html — never cache ──────────────────────────────────────
    # This is the entry point. If the browser always fetches a fresh copy,
    # it will pick up the new hashed asset filenames on every deploy.
    location = /index.html {
        add_header Cache-Control "no-cache, no-store, must-revalidate";
        add_header Pragma "no-cache";
        add_header Expires "0";
        try_files $uri =404;
    }

    # ── Service worker — never cache ──────────────────────────────────
    # The SW must always be fresh so the browser can detect a new version.
    location = /sw.js {
        add_header Cache-Control "no-cache, no-store, must-revalidate";
        add_header Pragma "no-cache";
        add_header Expires "0";
        try_files $uri =404;
    }

    # ── PWA manifest — short cache ────────────────────────────────────
    location = /manifest.webmanifest {
        add_header Cache-Control "public, max-age=86400"; # 1 day
        try_files $uri =404;
    }

    # ── Hashed assets — cache forever ────────────────────────────────
    # Vite outputs files like /assets/index-Ab3Cd4Ef.js
    # The hash changes on every build, so it's safe to cache indefinitely.
    location /assets/ {
        add_header Cache-Control "public, max-age=31536000, immutable";
        try_files $uri =404;
    }

    # ── Sitemap & XML files ───────────────────────────────────────────
    location ~* \.xml$ {
        types { }
        default_type "application/xml; charset=utf-8";
        add_header Cache-Control "public, max-age=86400"; # 1 day
        try_files $uri =404;
    }

    # ── Static assets in /public (icons, images) — long cache ────────
    location ~* \.(png|jpg|jpeg|gif|ico|svg|woff|woff2|ttf|eot|webp)$ {
        add_header Cache-Control "public, max-age=2592000"; # 30 days
        try_files $uri =404;
    }

    # ── SPA fallback — all other routes serve index.html ─────────────
    location / {
        try_files $uri $uri/ /index.html;
        add_header Cache-Control "no-cache, no-store, must-revalidate";
    }
}
