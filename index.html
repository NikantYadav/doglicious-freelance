  <!-- Critical CSS: inline minimal styles to prevent FOUC and render-blocking -->
  <style>
    /* Box model reset */
    *,
    *::before,
    *::after {
      box-sizing: border-box;
      margin: 0;
      padding: 0
    }

    html {
      scroll-behavior: smooth;
      -webkit-text-size-adjust: 100%
    }

    /* System font stack as fallback until Poppins loads */
    body {
      font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif;
      background: #ffffff;
      color: #1a1410;
      line-height: 1.55;
      overflow-x: hidden;
      -webkit-font-smoothing: antialiased
    }

    /* Prevent body padding shift before CSS loads */
    #root {
      min-height: 100vh
    }

    /* Hide content until React hydrates to prevent layout flash */
    #root:empty {
      background: #ffffff
    }

    /* Prevent invisible-text FOUC during font load */
    .ann,
    .nav-in,
    h1,
    h2,
    p,
    .btn {
      font-display: optional
    }
  </style>
