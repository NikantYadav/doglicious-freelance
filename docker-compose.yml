services:
  backend:
    build:
      context: .
      dockerfile: Dockerfile.backend
    container_name: vetrxscan-backend
    restart: unless-stopped
    # No host port — only reachable inside the Docker network by the frontend container
    expose:
      - "5000"
    environment:
      - NODE_ENV=production
    env_file:
      - server/.env.backend
    networks:
      - app-network
    healthcheck:
      test: ["CMD", "wget", "--quiet", "--tries=1", "--spider", "http://localhost:5000/api/health"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 40s

  frontend:
    build:
      context: .
      dockerfile: Dockerfile.frontend
    container_name: vetrxscan-frontend
    restart: unless-stopped
    ports:
      # Bind to localhost only — host Nginx proxies 80/443 → 8080
      - "127.0.0.1:8080:80"
    depends_on:
      - backend
    networks:
      - app-network
    healthcheck:
      test: ["CMD", "wget", "--quiet", "--tries=1", "--spider", "http://localhost:80"]
      interval: 30s
      timeout: 10s
      retries: 3

networks:
  app-network:
    driver: bridge
