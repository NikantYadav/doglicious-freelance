# ============================================================
# Host Nginx config for Doglicious (VetRxScan + Tools)
# 
# Place at: /etc/nginx/sites-available/doglicious
# Enable: sudo ln -s /etc/nginx/sites-available/doglicious /etc/nginx/sites-enabled/
#
# After linking, run:
#   sudo nginx -t && sudo systemctl reload nginx
#   sudo certbot --nginx -d doglicious.in -d www.doglicious.in
#
# Architecture:
#   - Host Nginx (this file) handles TLS termination on port 443
#   - Proxies all traffic to Docker frontend container on 127.0.0.1:8080
#   - Docker frontend nginx serves React SPA + static files
#   - Docker frontend nginx proxies /api/* to backend container
#
# Routes handled:
#   / — React SPA (home, /vetrxscan, /tools/*, /blog/*)
#   /api/* — Proxied to backend (including PayU callbacks)
#   /tools/natural-healing.html — Static HTML served from public/
# ============================================================

# HTTP — Certbot will modify this block and add the HTTPS block automatically
# when you run: sudo certbot --nginx -d doglicious.in -d www.doglicious.in
server {
    listen 80;
    listen [::]:80;
    server_name doglicious.in www.doglicious.in;

    # Security headers (Certbot will carry these into the HTTPS block too)
    add_header X-Frame-Options        "SAMEORIGIN"   always;
    add_header X-Content-Type-Options "nosniff"      always;
    add_header Referrer-Policy        "strict-origin-when-cross-origin" always;

    # Increase body size limit for AI image uploads
    client_max_body_size 20M;

    # Proxy everything to the Docker frontend container
    location / {
        proxy_pass         http://127.0.0.1:8080;
        proxy_http_version 1.1;

        proxy_set_header Host              $host;
        proxy_set_header X-Real-IP         $remote_addr;
        proxy_set_header X-Forwarded-For   $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;

        # WebSocket support
        proxy_set_header Upgrade    $http_upgrade;
        proxy_set_header Connection "upgrade";

        # Generous timeouts for AI/long-running requests
        proxy_connect_timeout 300s;
        proxy_send_timeout    300s;
        proxy_read_timeout    300s;
    }
}
