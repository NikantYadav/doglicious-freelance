# ============================================================
# Host Nginx config — place at /etc/nginx/sites-available/vetrxscan
# then: sudo ln -s /etc/nginx/sites-available/vetrxscan /etc/nginx/sites-enabled/
#
# After linking, run:
#   sudo nginx -t && sudo systemctl reload nginx
#   sudo certbot --nginx -d doglicious.in -d www.doglicious.in
#
# Certbot will automatically add the SSL server block below.
# ============================================================

# Redirect bare HTTP → HTTPS (Certbot will manage this block)
server {
    listen 80;
    listen [::]:80;
    server_name doglicious.in www.doglicious.in;

    # Certbot ACME challenge
    location /.well-known/acme-challenge/ {
        root /var/www/certbot;
    }

    # Redirect everything else to HTTPS
    location / {
        return 301 https://$host$request_uri;
    }
}

# HTTPS — proxy to Docker container on port 8080
# (Certbot will populate the ssl_certificate lines automatically)
server {
    listen 443 ssl;
    listen [::]:443 ssl;
    server_name doglicious.in www.doglicious.in;

    # --- SSL managed by Certbot ---
    # ssl_certificate     /etc/letsencrypt/live/doglicious.in/fullchain.pem;
    # ssl_certificate_key /etc/letsencrypt/live/doglicious.in/privkey.pem;
    # include             /etc/letsencrypt/options-ssl-nginx.conf;
    # ssl_dhparam         /etc/letsencrypt/ssl-dhparams.pem;
    # ------------------------------

    # Security headers
    add_header Strict-Transport-Security "max-age=31536000; includeSubDomains" always;
    add_header X-Frame-Options            "SAMEORIGIN"                          always;
    add_header X-Content-Type-Options     "nosniff"                             always;
    add_header Referrer-Policy            "strict-origin-when-cross-origin"     always;

    # Increase body size limit if you accept file uploads
    client_max_body_size 20M;

    # Proxy everything to the Docker frontend container
    location / {
        proxy_pass         http://127.0.0.1:8080;
        proxy_http_version 1.1;

        proxy_set_header Host              $host;
        proxy_set_header X-Real-IP         $remote_addr;
        proxy_set_header X-Forwarded-For   $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;

        # WebSocket support (if needed)
        proxy_set_header Upgrade    $http_upgrade;
        proxy_set_header Connection "upgrade";

        # Generous timeouts for AI/long-running requests
        proxy_connect_timeout 300s;
        proxy_send_timeout    300s;
        proxy_read_timeout    300s;
    }
}
